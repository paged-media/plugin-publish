# Canary publish of the paged.publish plugin bundle (@paged-media/publish).
#
# AUTH: classic npm automation token (NO trusted publisher / OIDC needed).
# Set a repo (or org) secret `NPM_TOKEN` = an npm automation token whose owner
# can publish in the @paged-media scope (incl. CREATING a new package). The
# publish step is GUARDED on that secret, so the workflow is a clean no-op
# until it's set (no chronic red), then auto-publishes each version bump.
#
# Why pnpm pack -> npm publish: `pnpm pack` applies publishConfig (repointing
# main/types to dist); npm does the authenticated upload.
#
# Pre-1.0: every version is a -canary.N prerelease under the `canary` dist-tag.
# An unchanged version skips; bump packages/publish-bundle/package.json to
# release. (A granular token limited to existing packages can't create the
# first version — the initial publish needs an owner/full-scope token.)
on:
  push:
    branches: [main]
  workflow_dispatch:

# Workflow-level so the publish step's `if:` guard can read it (a step's own
# env isn't visible to its `if`).
env:
  NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r --filter "./packages/*" typecheck
      - run: pnpm -r --filter "./packages/*" build # produce dist (pnpm pack skips prepublishOnly)
      - name: publish each bundle whose version is new (canary)
        # No-op without NPM_TOKEN, so the workflow is green until the secret is set.
        if: ${{ env.NPM_TOKEN != '' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -e
          for dir in packages/*/; do
            [ -f "$dir/package.json" ] || continue
            name=$(node -p "require('./$dir/package.json').name")
            version=$(node -p "require('./$dir/package.json').version")
            if npm view "$name@$version" version >/dev/null 2>&1; then
              echo "skip $name@$version (already published)"; continue
            fi
            ( cd "$dir" && pnpm pack --pack-destination "$RUNNER_TEMP" )
            tgz="$RUNNER_TEMP/$(echo "$name" | sed 's#@##; s#/#-#')-${version}.tgz"
            echo "publish $name@$version ($tgz)"
            npm publish "$tgz" --tag canary --access public
          done
